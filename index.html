<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Technical Binder 17626</title>
  <meta name="description" content="Technical Binder del robot — versión HTML/CSS/JS." />
  <!-- Favicon: el logo del jaguar (assets/logo.png) -->
  <link rel="icon" href="assets/logo.png" />

  <!-- ════════════ CÓMO USAR ════════════
       1) Abre esta carpeta con "Live Server" de VS Code (o corre: npx serve)
          ⚠️ No la abras con doble-click (file://): el modelo 3D necesita un servidor.
       2) Edita js/data.js para poner tu equipo/subsistemas.
       3) Pon tus imágenes en assets/ y tu modelo en assets/cad/robot.glb
       ==================================== -->

  <!-- Tipografías -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Montserrat (cuerpo y fallback de títulos). Conthrax es local (ver css/styles.css). -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Comparador antes/después (web component, se auto-registra) -->
  <script defer src="https://unpkg.com/img-comparison-slider@8/dist/index.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/img-comparison-slider@8/dist/styles.css" />

  <!-- Lightbox para galería -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />

  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- three.js (modelo 3D) — importmap para resolver "three" y sus addons -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>

<body>
  <!-- ░░░ NAVBAR ░░░ -->
  <header class="navbar" id="navbar">
    <div class="container nav-inner">
      <a class="brand" href="#top" aria-label="Aztech II — inicio">
        <!-- Logo del jaguar (assets/logo.png). Si falta, se oculta. -->
        <img class="brand-logo" src="assets/logo.png" alt="" onerror="this.style.display='none'" />
        <!-- Logo del nombre del equipo, blanco (assets/wordmark.png).
             Si falta, muestra el texto de respaldo. -->
        <img class="brand-wordmark" src="assets/wordmark.png" alt="Aztech II"
          onerror="this.style.display='none'; this.parentElement.querySelector('.brand-text').style.display='flex'" />
        <span class="brand-text" style="display:none">
          <strong id="brand-team">Team</strong>
          <small id="brand-name"></small>
        </span>
      </a>
      <!-- Botón "Conócenos / Meet us" al inicio de la navbar -->
      <a id="nav-website" class="nav-cta" target="_blank" rel="noopener" data-i18n="Conócenos">Conócenos</a>
      <nav class="nav-links" id="nav-links">
        <a href="#top" data-i18n="Robot">Robot</a>
        <a href="#sections" data-i18n="Subsistemas">Subsistemas</a>
        <a href="#mexico-vs-niagara" data-i18n="Prototipos">Prototipos</a>
        <a href="#software" data-i18n="Software">Software</a>
        <!-- Dropdown "Our Pillars": conecta con el sitio principal de Aztech II -->
        <div class="nav-dd" id="nav-dd">
          <button type="button" class="nav-dd-btn" id="nav-dd-btn" aria-expanded="false" aria-haspopup="true">
            Our Pillars
            <svg class="dd-chev" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6" /></svg>
          </button>
          <div class="nav-dd-menu">
            <a href="https://aztech-2-17626.vercel.app/index.html">Aztech II</a>
            <a href="https://aztech-2-17626.vercel.app/first.html">FIRST</a>
            <a href="https://aztech-2-17626.vercel.app/education.html">Education</a>
            <a href="https://aztech-2-17626.vercel.app/environment.html">Environment</a>
          </div>
        </div>
      </nav>
      <!-- Menú de idiomas (no se traduce a sí mismo) -->
      <div class="lang-menu notranslate" translate="no" aria-label="Idioma">
        <button class="lang-btn" data-lang="es" type="button">ES</button>
        <button class="lang-btn active" data-lang="en" type="button">EN</button>
        <button class="lang-btn" data-lang="fr" type="button">FR</button>
      </div>
      <span class="season-badge" id="season-badge">2026</span>
      <button class="hamburger" id="hamburger" aria-label="Menú">☰</button>
    </div>
  </header>

  <main>
    <!-- ░░░ HERO ░░░ -->
    <section class="hero container" id="top">
      <div class="hero-text">
        <!-- Logo de la temporada FTC DECODE (reemplaza el badge "Temporada 2026 · DECODE") -->
        <img class="hero-decode" src="assets/decode.png" alt="FTC DECODE 2026" onerror="this.style.display='none'" />
        <h1>
          <span class="hero-kicker" data-i18n="Conoce a">Conoce a</span>
          <span class="gradient notranslate" translate="no" id="hero-robot">PURPLE SPIKE</span>
        </h1>
        <p id="hero-tagline">Built to ride the surge.</p>
        <div class="hero-cta">
          <a class="btn btn-accent" href="#sections" data-i18n="Explorar subsistemas">Explorar subsistemas</a>
          <a class="btn btn-outline" id="hero-yt" href="#" target="_blank" rel="noopener" data-i18n="Ver reveal ▶">Ver reveal ▶</a>
        </div>
      </div>

      <!-- Render de Purple Spike en la mitad derecha del hero (assets/hero.png). -->
      <div class="hero-image-wrap">
        <img src="assets/hero.png" alt="Render de Purple Spike — Aztech II 17626" class="hero-image"
          onerror="this.style.display='none'" />
      </div>
    </section>

    <!-- ░░░ SECCIONES (las genera main.js) ░░░ -->
    <div class="container sections" id="sections"></div>
  </main>

  <!-- ░░░ FOOTER (compacto: logos · redes · crédito) ░░░ -->
  <footer class="footer">
    <div class="container footer-mini">
      <div class="footer-mini-brand">
        <img class="footer-logo" src="assets/logo.png" alt="" onerror="this.style.display='none'" />
        <img class="footer-wordmark" src="assets/wordmark.png" alt="Aztech II" onerror="this.style.display='none'" />
      </div>
      <div class="footer-mini-social">
        <a href="https://www.instagram.com/aztech_2_17626/" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a href="https://www.tiktok.com/@aztech_ll_17626" target="_blank" rel="noopener noreferrer">TikTok</a>
      </div>
      <p class="footer-mini-credit">
        <span data-i18n="Hecho con">Hecho con</span>
        <span class="footer-heart">&#9829;</span>
        <span data-i18n="por Aztech II · FIRST Tech Challenge 17626">por Aztech II · FIRST Tech Challenge 17626</span>
      </p>
    </div>
  </footer>

  <!-- ░░░ CHAT (FAB + drawer) ░░░ -->
  <button class="chat-fab" id="chat-fab" aria-label="Preguntas frecuentes">?</button>
  <aside class="chat-drawer" id="chat-drawer" aria-hidden="true">
    <div class="chat-header">
      <strong id="chat-title" data-i18n="Preguntas frecuentes">Preguntas frecuentes</strong>
      <button id="chat-close" aria-label="Cerrar">✕</button>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
  </aside>

  <!-- ░░░ LIBRERÍAS + SCRIPTS PROPIOS ░░░ -->
  <!-- Iconos Lucide (UMD global) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <!-- Mermaid (diagramas) UMD global -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <!-- Lightbox -->
  <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>

  <!-- i18n: debe cargar ANTES de data.js/main.js para que t()/tData() existan -->
  <script src="js/translate.js"></script>
  <!-- Datos + lógica (clásicos: comparten scope global) -->
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <!-- Preguntas pre-hechas del chatbot (debe cargar antes que chat.js) -->
  <script src="js/faq.js"></script>
  <script src="js/chat.js"></script>
  <!-- Visor 3D (módulo: usa three.js) -->
  <script type="module" src="js/cad.js"></script>
</body>
</html>
